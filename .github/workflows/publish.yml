name: Publish package

# On a published GitHub Release (or manual dispatch), publish to BOTH registries:
#   - npm as the canonical unscoped `cryptofort` (needs an NPM_TOKEN repo secret)
#   - GitHub Packages as `@bradley-t-t/cryptofort` (scope required; uses GITHUB_TOKEN)
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm run build
      - run: npm test
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
      - run: npm install
      - run: npm run build
      # GitHub Packages requires the owner scope, so publish under the scoped name.
      - run: npm pkg set name=@bradley-t-t/cryptofort
      - run: npm pkg delete publishConfig.registry
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
